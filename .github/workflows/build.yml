name: Cloud Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Gradle 8.3
        run: |
          wget https://services.gradle.org/distributions/gradle-8.3-bin.zip
          sudo unzip -d /opt/gradle gradle-8.3-bin.zip
          echo "/opt/gradle/gradle-8.3/bin" >> $GITHUB_PATH

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DreamRecall-APK
          path: app/build/outputs/apk/debug/app-debug.apk
